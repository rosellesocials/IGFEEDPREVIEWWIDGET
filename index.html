<script>
  const STORAGE_KEY = 'igGridWidgetSettings';

  function saveSettings(settings) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(settings));
    } catch (e) {}
  }

  function loadSettings() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    } catch (e) {
      return {};
    }
  }

  function encodeSettings(settings) {
    return btoa(unescape(encodeURIComponent(JSON.stringify(settings))));
  }

  function decodeSettings(encoded) {
    return JSON.parse(decodeURIComponent(escape(atob(encoded))));
  }

  function buildEmbedUrl(settings) {
    const url = new URL(window.location.origin + window.location.pathname);
    url.searchParams.set('embed', '1');
    url.hash = encodeSettings(settings);
    return url.toString();
  }

  function copyEmbedUrl() {
    const input = document.getElementById('embedUrl');
    input.select();
    document.execCommand('copy');
    alert('Embed link copied!');
  }

  const toggleBtn = document.getElementById('tog');
  if (toggleBtn) {
    toggleBtn.addEventListener('click', function() {
      this.classList.toggle('on');
      document.getElementById('tog-label').textContent =
        this.classList.contains('on')
          ? "Yes, I've completed the steps above"
          : 'Mark as complete';
    });
  }

  function showStatus(msg, type) {
    const el = document.getElementById('status');
    if (!el) return;
    el.style.display = 'block';
    el.className = 'status ' + type;
    el.textContent = msg;
  }

  function escapeHtml(str) {
    return String(str || '').replace(/[&<>"']/g, function(c) {
      return {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[c];
    });
  }

  async function generate() {
    const token = document.getElementById('token').value.trim();
    const pageUrl = document.getElementById('pageurl').value.trim();
    const btn = document.getElementById('genbtn');

    if (!token) return showStatus('Please enter your Notion integration token.', 'error');
    if (!pageUrl) return showStatus('Please enter your Notion page or database URL.', 'error');

    if (btn) btn.disabled = true;
    showStatus('Connecting to your Notion database…', 'loading');

    try {
      const res = await fetch('/api/notion', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, pageUrl })
      });

      const data = await res.json();

      if (!res.ok || !data.success) {
        if (btn) btn.disabled = false;
        return showStatus('Error: ' + (data.error || 'Could not connect.'), 'error');
      }

      const settings = {
        token,
        pageUrl,
        igusername: document.getElementById('igusername').value.trim(),
        igdisplayname: document.getElementById('igdisplayname').value.trim(),
        igbio: document.getElementById('igbio').value.trim(),
        iglink: document.getElementById('iglink').value.trim(),
        igavatar: document.getElementById('igavatar').value.trim()
      };

      saveSettings(settings);

      showStatus('✓ Connected! ' + data.items.length + ' items loaded.', 'success');
      renderGrid(data.items, 'preview', 'item-list', settings);

      document.getElementById('embedCard').style.display = 'block';
      document.getElementById('embedUrl').value = buildEmbedUrl(settings);

      if (btn) btn.disabled = false;

    } catch (e) {
      if (btn) btn.disabled = false;
      showStatus('Connection failed: ' + e.message, 'error');
    }
  }

  function renderGrid(items, previewId, itemListId, settings = {}) {
    const safeItems = Array.isArray(items) ? items : [];

    const username = settings.igusername || document.getElementById('igusername')?.value.trim() || '@yourusername';
    const displayname = settings.igdisplayname || document.getElementById('igdisplayname')?.value.trim() || 'Your Display Name';
    const bio = settings.igbio || document.getElementById('igbio')?.value.trim() || '';
    const link = settings.iglink || document.getElementById('iglink')?.value.trim() || '';
    const avatar = settings.igavatar || document.getElementById('igavatar')?.value.trim() || '';

    let html = '<div class="ig-frame">';

    html += '<div class="ig-profile">';
    html += avatar
      ? '<img class="ig-avatar" src="' + escapeHtml(avatar) + '" alt="avatar">'
      : '<div class="ig-avatar">' + escapeHtml(username.replace('@', '').charAt(0).toUpperCase() || 'I') + '</div>';

    html += '<div>';
    html += '<div class="ig-username">' + escapeHtml(username) + '</div>';
    html += '<div class="ig-displayname">' + escapeHtml(displayname) + '</div>';
    if (bio) html += '<div class="ig-bio">' + escapeHtml(bio) + '</div>';
    if (link) html += '<a class="ig-link" href="' + escapeHtml(link) + '" target="_blank">' + escapeHtml(link) + '</a>';
    html += '</div></div>';

    html += '<div class="ig-toolbar">';
    html += '<button class="ig-tool-icon" onclick="generate()" title="Refresh">⟳</button>';
    html += '<button class="ig-plan-grid">Plan grid ⊞</button>';
    html += '<button class="ig-tool-icon">▦</button>';
    html += '<button class="ig-tool-icon">⋯</button>';
    html += '</div>';

    html += '<div class="ig-grid">';

    for (let i = 0; i < 9; i++) {
      const item = safeItems[i];

      if (item && item.image) {
        html += '<div class="ig-cell">';
        html += '<img src="' + escapeHtml(item.image) + '" alt="' + escapeHtml(item.title || '') + '">';
        if (item.date) html += '<span class="ig-dbadge">' + escapeHtml(item.date.substring(5, 10)) + '</span>';
        html += '</div>';
      } else if (item) {
        html += '<div class="ig-cell">';
        html += '<div class="ig-clabel">' + escapeHtml(item.title || 'Untitled') + '</div>';
        if (item.date) html += '<span class="ig-dbadge">' + escapeHtml(item.date.substring(5, 10)) + '</span>';
        html += '</div>';
      } else {
        html += '<div class="ig-cell"></div>';
      }
    }

    html += '</div></div>';

    const previewEl = document.getElementById(previewId);
    if (previewEl) previewEl.innerHTML = html;

    if (itemListId) {
      const listEl = document.getElementById(itemListId);
      if (listEl) {
        listEl.innerHTML = safeItems.slice(0, 9).map(function(item) {
          return '<div class="item-row"><div class="dot"></div><span>' +
            escapeHtml(item.title || 'Untitled') +
            '</span>' +
            (item.image ? '<span class="has-img">✓ image</span>' : '') +
            '</div>';
        }).join('');
      }
    }
  }

  async function loadEmbedView() {
    document.getElementById('setupSection').style.display = 'none';
    document.getElementById('embedOnlyArea').style.display = 'block';

    const sidebar = document.querySelector('.sidebar');
    const main = document.querySelector('.main');

    if (sidebar) sidebar.style.display = 'none';
    if (main) main.style.padding = '0';

    let settings = {};

    try {
      if (window.location.hash) {
        settings = decodeSettings(window.location.hash.substring(1));
      } else {
        settings = loadSettings();
      }
    } catch (e) {
      settings = {};
    }

    if (!settings.token || !settings.pageUrl) {
      document.getElementById('embedPreview').innerHTML =
        '<div class="preview-empty" style="padding:2rem;">Widget not set up yet. Please generate the embed link first.</div>';
      return;
    }

    try {
      const res = await fetch('/api/notion', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: settings.token, pageUrl: settings.pageUrl })
      });

      const data = await res.json();

      if (!res.ok || !data.success) {
        document.getElementById('embedPreview').innerHTML =
          '<div class="preview-empty" style="padding:2rem;">Could not load: ' +
          escapeHtml(data.error || 'unknown error') +
          '</div>';
        return;
      }

      renderGrid(data.items, 'embedPreview', null, settings);

    } catch (e) {
      document.getElementById('embedPreview').innerHTML =
        '<div class="preview-empty" style="padding:2rem;">Connection failed: ' +
        escapeHtml(e.message) +
        '</div>';
    }
  }

  (function init() {
    const params = new URLSearchParams(window.location.search);

    if (params.get('embed') === '1') {
      loadEmbedView();
      return;
    }

    const settings = loadSettings();

    if (settings.token) document.getElementById('token').value = settings.token;
    if (settings.pageUrl) document.getElementById('pageurl').value = settings.pageUrl;
    if (settings.igusername) document.getElementById('igusername').value = settings.igusername;
    if (settings.igdisplayname) document.getElementById('igdisplayname').value = settings.igdisplayname;
    if (settings.igbio) document.getElementById('igbio').value = settings.igbio;
    if (settings.iglink) document.getElementById('iglink').value = settings.iglink;
    if (settings.igavatar) document.getElementById('igavatar').value = settings.igavatar;

    if (settings.token && settings.pageUrl) {
      document.getElementById('embedCard').style.display = 'block';
      document.getElementById('embedUrl').value = buildEmbedUrl(settings);
    }
  })();
</script>
